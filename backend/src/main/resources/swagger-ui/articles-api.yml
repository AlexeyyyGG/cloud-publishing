openapi: 3.0.3
info:
  title: Articles API
  version: 1.0.0
servers:
  - url: http://localhost:8080/

security:
  - bearerAuth: [ ]

paths:
  /articles:
    get:
      summary: Получение списка всех статей
      responses:
        '200':
          description: Успешный ответ со списком статей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleGetAllDTO'
        '401':
          description: Требуется авторизация
    post:
      summary: Добавление статьи
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleForm'
      responses:
        '201':
          description: Статья добавлена
        '400':
          description: Некорректные входные данные
        '401':
          description: Требуется авторизация
  /articles/{id}:
    parameters:
      - name: id
        in: path
        description: Уникальный идентификатор статьи
        required: true
        schema:
          type: integer
    get:
      summary: Получение статьи по id
      responses:
        '200':
          description: Успешный ответ статья найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleFormDetails'
        '400':
          description: Некорректный id
        '401':
          description: Требуется авторизация
        '404':
          description: Статья с указанным id не найдена
    put:
      summary: Обновление данных статьи
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleForm'
      responses:
        '200':
          description: Данные статьи обновлены
        '400':
          description: Некорректные входные данные
        '401':
          description: Требуется авторизация
        '404':
          description: Статья с заданным id не найдена
    delete:
      summary: Удаление статьи по id
      responses:
        '204':
          description: Статья удалена
        '400':
          description: Некорректный id
        '401':
          description: Требуется авторизация
        '404':
          description: Статья с заданным id не найдена
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ArticleGetAllDTO:
      type: object
      properties:
        name:
          type: string
          description: Название статьи
        publicationName:
          type: string
          description: Название публикации
        categoryName:
          type: string
          description: Название рубрики
        authorName:
          type: string
          description: ФИО автора
        coAuthorsNames:
          type: array
          description: ФИО соавторов
          items:
            type: string

    ArticleForm:
      type: object
      properties:
        publicationId:
          type: integer
          description: Идентификатор публикации
        categoryId:
          type: integer
          description: Идентификатор рубрики
        name:
          type: string
          description: Название статьи
        content:
          type: string
          description: Содержание статьи
        coAuthorsIds:
          type: array
          description: Список идентификаторов соавторов
          items:
            type: integer
      required:
        - publicationId
        - categoryId
        - name
        - content

    ArticleFormDetails:
      type: object
      properties:
        publicationId:
          type: integer
          description: Идентификатор публикации
        categoryId:
          type: integer
          description: Идентификатор рубрики
        name:
          type: string
          description: Название статьи
        content:
          type: string
          description: Содержание статьи
        coAuthorsIds:
          type: array
          description: Список идентификаторов соавторов
          items:
            type: integer
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
      required:
        - publicationId
        - categoryId
        - name
        - content

    EmployeeShort:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
      required:
        - id
        - firstName
        - lastName
        - middleName

    Review:
      type: object
      properties:
        reviewer:
          $ref: '#/components/schemas/EmployeeShort'
        reviewText:
          type: string
          description: Текст рецензии
      required:
        - reviewer
        - reviewText